<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cyssie</title>

  <style>
    h2 {
      font-weight: 600;
      letter-spacing: 0.5px;
      animation: fadeIn 0.8s ease;
      margin-top: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      margin: 0;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
    }

    .container {
      width: min(1200px, 92vw);
      margin: 40px auto;
      padding: 30px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }

    .container:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    iframe {
      width: 100%;
      height: 80vh;
      min-height: 700px;
      border: none;
      border-radius: 12px;
      background: #1e293b;
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Cyssie</h2>
    <p>Celeste's personal AI agent.</p>

    <p>
      Cyssie is my personal AI agent.
      Ask her anything, and she'll do her best to help you out!
    </p>

    <iframe src="https://cyssie-api.onrender.com"></iframe>
  </div>
</body>
</html>
