<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Under Construction</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(99,102,241,0.20), transparent 24%),
        radial-gradient(circle at 78% 22%, rgba(168,85,247,0.18), transparent 28%),
        radial-gradient(circle at 50% 75%, rgba(34,211,238,0.12), transparent 28%),
        radial-gradient(circle at 55% 45%, rgba(255,255,255,0.05), transparent 18%),
        linear-gradient(180deg, #070b18 0%, #020617 45%, #01030b 100%);
      color: #e5eefc;
      cursor: default;
    }

    .sky {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
    }

    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      pointer-events: none;
      animation: floatNebula 16s ease-in-out infinite;
      z-index: 0;
    }

    .nebula.n1 {
      width: 420px;
      height: 420px;
      left: 6%;
      top: 8%;
      background: rgba(96,165,250,0.48);
    }

    .nebula.n2 {
      width: 520px;
      height: 520px;
      right: 4%;
      top: 4%;
      background: rgba(167,139,250,0.36);
      animation-delay: 4s;
    }

    .nebula.n3 {
      width: 520px;
      height: 520px;
      left: 26%;
      bottom: -12%;
      background: rgba(34,211,238,0.22);
      animation-delay: 8s;
    }

    .milky-band {
      position: absolute;
      left: -8%;
      top: 18%;
      width: 120%;
      height: 34%;
      transform: rotate(-12deg);
      background:
        radial-gradient(circle at 20% 50%, rgba(255,255,255,0.10), transparent 18%),
        radial-gradient(circle at 35% 55%, rgba(255,255,255,0.08), transparent 16%),
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.12), transparent 18%),
        radial-gradient(circle at 65% 45%, rgba(255,255,255,0.09), transparent 15%),
        radial-gradient(circle at 80% 52%, rgba(255,255,255,0.08), transparent 16%);
      filter: blur(36px);
      opacity: 0.42;
      z-index: 0;
      pointer-events: none;
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 8px rgba(255,255,255,0.85);
      animation: twinkle 3s ease-in-out infinite;
    }

    .star.big {
      width: 3px;
      height: 3px;
      box-shadow: 0 0 12px rgba(255,255,255,1);
    }

    .star.big::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 1px;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
    }

    .star.big::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1px;
      height: 12px;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
    }

    .otter-wrap {
      position: absolute;
      left: 10%;
      top: 22%;
      width: clamp(90px, 11vw, 145px);
      z-index: 2;
      opacity: 0.96;
      animation:
        otterFloat 10s ease-in-out infinite,
        otterDrift 38s linear infinite;
      pointer-events: none;
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.08));
    }

    .otter-wrap::before {
      content: "";
      position: absolute;
      inset: 18% 16%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.10), rgba(255,255,255,0.02) 55%, transparent 72%);
      filter: blur(10px);
      z-index: -1;
    }

    .otter-img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
      text-shadow: 0 0 28px rgba(255,255,255,0.10);
      animation: fadeUp 1.2s ease forwards;
    }

    p {
      max-width: 760px;
      font-size: clamp(1rem, 2vw, 1.12rem);
      line-height: 1.8;
      color: rgba(203,213,225,0.88);
      animation: fadeUp 1.6s ease forwards;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      z-index: 6;
      font-size: 0.92rem;
      color: rgba(148,163,184,0.82);
      letter-spacing: 0.03em;
      pointer-events: none;
      animation: fadeIn 2.4s ease forwards;
    }

    .trail-container {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .trail-star {
      position: absolute;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      margin-top: -4px;
      border-radius: 50%;
      background: white;
      box-shadow:
        0 0 8px rgba(255,255,255,0.95),
        0 0 20px rgba(125,211,252,0.60);
      opacity: 0;
      transform: translate3d(0, 0, 0) scale(1);
    }

    .trail-star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      filter: blur(5px);
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.26;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    @keyframes floatNebula {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(20px, -18px) scale(1.05);
      }
    }

    @keyframes otterFloat {
      0%, 100% {
        transform: translateY(0px) rotate(-5deg);
      }
      25% {
        transform: translateY(-8px) rotate(-2deg);
      }
      50% {
        transform: translateY(-2px) rotate(2deg);
      }
      75% {
        transform: translateY(10px) rotate(5deg);
      }
    }

    @keyframes otterDrift {
      0% {
        left: 10%;
        top: 22%;
      }
      25% {
        left: 25%;
        top: 16%;
      }
      50% {
        left: 58%;
        top: 23%;
      }
      75% {
        left: 72%;
        top: 15%;
      }
      100% {
        left: 10%;
        top: 22%;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="sky">
    <div class="nebula n1"></div>
    <div class="nebula n2"></div>
    <div class="nebula n3"></div>
    <div class="milky-band"></div>

    <div class="stars">
      <span class="star" style="left: 6%; top: 14%; animation-delay: 0.2s;"></span>
      <span class="star big" style="left: 13%; top: 28%; animation-delay: 0.8s;"></span>
      <span class="star" style="left: 18%; top: 10%; animation-delay: 1.2s;"></span>
      <span class="star" style="left: 24%; top: 36%; animation-delay: 0.4s;"></span>
      <span class="star big" style="left: 32%; top: 17%; animation-delay: 1.4s;"></span>
      <span class="star" style="left: 39%; top: 8%; animation-delay: 0.6s;"></span>
      <span class="star" style="left: 46%; top: 27%; animation-delay: 1.8s;"></span>
      <span class="star big" style="left: 54%; top: 12%; animation-delay: 0.3s;"></span>
      <span class="star" style="left: 61%; top: 31%; animation-delay: 1.1s;"></span>
      <span class="star" style="left: 68%; top: 9%; animation-delay: 0.9s;"></span>
      <span class="star big" style="left: 77%; top: 21%; animation-delay: 1.7s;"></span>
      <span class="star" style="left: 86%; top: 11%; animation-delay: 0.7s;"></span>
      <span class="star" style="left: 93%; top: 29%; animation-delay: 1.5s;"></span>

      <span class="star" style="left: 9%; top: 58%; animation-delay: 0.5s;"></span>
      <span class="star" style="left: 18%; top: 74%; animation-delay: 1.4s;"></span>
      <span class="star big" style="left: 29%; top: 66%; animation-delay: 0.2s;"></span>
      <span class="star" style="left: 40%; top: 82%; animation-delay: 1s;"></span>
      <span class="star" style="left: 51%; top: 62%; animation-delay: 1.8s;"></span>
      <span class="star big" style="left: 63%; top: 76%; animation-delay: 0.6s;"></span>
      <span class="star" style="left: 74%; top: 64%; animation-delay: 1.3s;"></span>
      <span class="star" style="left: 84%; top: 81%; animation-delay: 0.8s;"></span>
      <span class="star big" style="left: 92%; top: 69%; animation-delay: 1.6s;"></span>
    </div>

    <div class="otter-wrap" aria-hidden="true">
      <img
        class="otter-img"
        src="../pics/sea_otter.png"
        alt="floating otter"
        onerror="this.style.display='none'"
      />
    </div>

    <div class="trail-container" id="trailContainer"></div>

    <div class="content">
      <h1>Page Under Construction</h1>
      <p>
        This little corner is currently being rebuilt beneath the Milky Way.<br />
        Please check back later.
      </p>
    </div>

  </div>

  <script>
    const trailContainer = document.getElementById("trailContainer");

    const trailCount = 14;
    const trailStars = [];

    let mouseX = window.innerWidth * 0.5;
    let mouseY = window.innerHeight * 0.5;

    for (let i = 0; i < trailCount; i++) {
      const star = document.createElement("div");
      star.className = "trail-star";
      trailContainer.appendChild(star);
      trailStars.push({
        el: star,
        x: mouseX,
        y: mouseY,
        scale: 1 - i * 0.045
      });
    }

    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      trailStars[0].x = mouseX;
      trailStars[0].y = mouseY;
      trailStars[0].el.style.opacity = "1";
    });

    window.addEventListener("mouseleave", () => {
      trailStars.forEach(s => s.el.style.opacity = "0");
    });

    window.addEventListener("mouseenter", () => {
      trailStars.forEach((s, i) => {
        if (i < 6) s.el.style.opacity = "1";
      });
    });

    function animate() {
      for (let i = 1; i < trailStars.length; i++) {
        trailStars[i].x += (trailStars[i - 1].x - trailStars[i].x) * 0.28;
        trailStars[i].y += (trailStars[i - 1].y - trailStars[i].y) * 0.28;
      }

      trailStars.forEach((star, i) => {
        const opacity = Math.max(0, 0.95 - i * 0.065);
        star.el.style.opacity = opacity;
        star.el.style.transform =
          `translate3d(${star.x}px, ${star.y}px, 0) scale(${star.scale})`;
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
