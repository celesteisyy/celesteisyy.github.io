<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cyssie</title>

  <style>
    h2 {
      font-weight: 600;
      letter-spacing: 0.5px;
      animation: fadeIn 0.8s ease;
      margin-top: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      margin: 0;
      background: #0f172a;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }

    .container {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .container:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .container {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }
  </style>
</head>

<body>
  <iframe src="https://cyssie-api.onrender.com"></iframe>
</body>
</html>
