<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cyssie</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 700px;
      display: flex;
      flex-direction: column;
    }

    h2 {
      text-align: center;
      margin: 20px 0;
      font-weight: 500;
    }

    #chatbox {
      flex: 1;
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      font-size: 14px;
    }

    .user {
      align-self: flex-end;
      background: #3b82f6;
    }

    .bot {
      align-self: flex-start;
      background: #334155;
    }

    .input-area {
      display: flex;
      margin: 15px 0;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .loading {
      font-style: italic;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Cyssie</h2>

  <div id="chatbox"></div>

  <div class="input-area">
    <input id="input" placeholder="Type a message..." />
    <button id="sendBtn" onclick="sendMessage()">Send</button>
    <button id="resetBtn" style="background:#ef4444;">Clear</button>
  </div>
</div>

<script>
const chatbox = document.getElementById("chatbox");
const inputField = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

inputField.addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendMessage();
});

function addMessage(text, type) {
  const div = document.createElement("div");
  div.classList.add("message", type);
  div.innerText = text;
  chatbox.appendChild(div);
  chatbox.scrollTop = chatbox.scrollHeight;
  return div;
}

async function sendMessage() {
  const message = inputField.value.trim();
  if (!message) return;

  addMessage(message, "user");
  inputField.value = "";

  const loadingDiv = addMessage("Typing...", "bot");


  try {
    const res = await fetch("https://cyssie-api.onrender.com/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: message })
    });

    const data = await res.json();
    loadingDiv.remove();
    addMessage(data.response, "bot");

  } catch (err) {
    loadingDiv.remove();
    addMessage("Error connecting to server.", "bot");
  }
}

async function resetChat() {
  await fetch("https://cyssie-api.onrender.com/reset", {
    method: "POST"
  });

  chatbox.innerHTML = "";
}

  window.sendMessage = sendMessage;
  window.resetChat = resetChat;
</script>

</body>
</html>
