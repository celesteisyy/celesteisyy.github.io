<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyssie Playground</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="nav-wrap">
    <nav>
      <a class="brand" href="/playground/">Cyssie</a>

      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/blogs/">Blogs</a>
        <a class="nav-link" href="https://www.linkedin.com/in/yueying-huang/" target="_blank" rel="noreferrer">LinkedIn</a>
      </div>
    </nav>
  </div>

  <main class="container">
    <section class="workspace">
      <aside class="sidebar">
        <div class="sidebar-head">
          <span class="eyebrow">Tiny AI Agent</span>
          <h1>Cyssie Playground</h1>
          <p>A quiet workspace for asking, testing, and building with Cyssie.</p>
        </div>

        <div class="sidebar-actions">
          <button class="primary-btn" id="newChatButton" type="button">New chat</button>
          <button id="tokenButton" type="button">Access token</button>
        </div>

        <div class="sessions" id="sessions"></div>

        <div class="sidebar-foot">
          Conversations are saved locally in this browser.
        </div>
      </aside>

      <section class="chat-shell">
        <div class="chat-topbar">
          <div class="window-dots">
            <span></span><span></span><span></span>
          </div>
          <div class="chat-title" id="activeTitle">cyssie_session.md</div>
          <div class="top-actions">
            <button class="small-btn" id="clearChatButton" type="button">Clear</button>
            <button class="small-btn" id="deleteChatButton" type="button">Delete</button>
          </div>
        </div>

        <div id="chat"></div>

        <form class="composer" id="chatForm">
          <textarea id="messageInput" placeholder="Ask Cyssie..." rows="1"></textarea>
          <button class="send-btn" id="sendButton" type="submit">Send</button>
        </form>
      </section>
    </section>
  </main>

  <div class="token-modal" id="tokenModal">
    <div class="modal-card">
      <h2>Access token</h2>
      <p>Enter your Cyssie access token. It will be saved only in this browser.</p>
      <input id="tokenInput" type="password" placeholder="Bearer token" />
      <button class="primary-btn" id="saveTokenButton" type="button">Save token</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
