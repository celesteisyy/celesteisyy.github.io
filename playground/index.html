<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyssie Playground</title>

  <style>
    :root {
      color-scheme: light dark;

      --bg: #f7f8fc;
      --bg-elevated: rgba(255, 255, 255, 0.72);
      --card: rgba(255, 255, 255, 0.82);
      --text: #172033;
      --muted: #667089;
      --border: rgba(23, 32, 51, 0.10);
      --primary: #5b7cff;
      --primary-soft: rgba(91, 124, 255, 0.10);
      --accent: #8b6dff;
      --danger: #d94f70;
      --shadow: 0 10px 30px rgba(27, 39, 78, 0.08);
      --maxw: 1180px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1020;
        --bg-elevated: rgba(255, 255, 255, 0.06);
        --card: rgba(255, 255, 255, 0.05);
        --text: #e8eefc;
        --muted: #a8b2ca;
        --border: rgba(255, 255, 255, 0.10);
        --primary: #8aa2ff;
        --primary-soft: rgba(138, 162, 255, 0.14);
        --accent: #b29cff;
        --danger: #ff7b9b;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      }
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, var(--primary-soft), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(139, 109, 255, 0.12), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { color: inherit; }

    .nav-wrap {
      position: sticky;
      top: 14px;
      z-index: 100;
      padding: 14px 18px 0;
    }

    nav {
      max-width: var(--maxw);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 999px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link {
      display: inline-block;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      text-decoration: none;
      font-size: 0.95rem;
      color: var(--text);
      transition: 0.2s ease;
    }

    .nav-link:hover {
      transform: translateY(-1px);
      background: var(--primary-soft);
      border-color: rgba(91, 124, 255, 0.22);
      color: var(--primary);
    }

    .container {
      width: min(var(--maxw), calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 42px;
    }

    .workspace {
      height: calc(100vh - 122px);
      min-height: 640px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 22px;
    }

    .sidebar,
    .chat-shell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .sidebar-head { padding: 6px 6px 14px; }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 12px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.86rem;
    }

    .sidebar h1 {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .sidebar p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .sidebar-actions {
      display: grid;
      gap: 10px;
      margin: 12px 0 14px;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 11px 14px;
      background: var(--bg-elevated);
      color: var(--text);
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: var(--primary-soft);
      color: var(--primary);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .primary-btn {
      border: 0;
      background: var(--primary);
      color: white;
    }

    .primary-btn:hover {
      color: white;
      filter: brightness(1.03);
    }

    .danger-btn:hover {
      color: var(--danger);
      background: rgba(217, 79, 112, 0.10);
    }

    .sessions {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
    }

    .session-item {
      width: 100%;
      text-align: left;
      display: block;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 11px 12px;
      color: var(--text);
      cursor: pointer;
    }

    .session-item:hover {
      background: var(--primary-soft);
      border-color: var(--border);
    }

    .session-item.active {
      background: var(--primary-soft);
      border-color: rgba(91, 124, 255, 0.25);
      color: var(--primary);
    }

    .session-title {
      display: block;
      font-weight: 700;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .session-meta {
      display: block;
      margin-top: 3px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .sidebar-foot {
      padding: 12px 6px 0;
      color: var(--muted);
      font-size: 0.84rem;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }

    .chat-shell {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
    }

    .window-dots {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .window-dots span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--muted);
      opacity: 0.42;
    }

    .chat-title {
      font-weight: 700;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .small-btn {
      padding: 8px 11px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 84%;
      padding: 14px 16px;
      border-radius: 20px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.98rem;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 7px;
      box-shadow: var(--shadow);
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-bottom-left-radius: 7px;
    }

    .msg.system {
      align-self: center;
      max-width: 92%;
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--border);
      font-size: 0.92rem;
      text-align: center;
    }

    .composer {
      display: flex;
      gap: 12px;
      padding: 18px;
      border-top: 1px solid var(--border);
      background: var(--bg-elevated);
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      padding: 13px 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      outline: none;
      background: var(--card);
      color: var(--text);
      font: inherit;
    }

    textarea::placeholder { color: var(--muted); }

    .send-btn {
      border: 0;
      background: var(--primary);
      color: white;
      padding: 0 20px;
    }

    .token-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(5, 8, 18, 0.56);
      backdrop-filter: blur(10px);
    }

    .token-modal.visible { display: flex; }

    .modal-card {
      width: min(440px, 100%);
      padding: 24px;
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .modal-card h2 {
      margin: 0 0 8px;
      font-size: 1.45rem;
    }

    .modal-card p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .modal-card input {
      width: 100%;
      padding: 12px 13px;
      border-radius: 15px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      font: inherit;
      outline: none;
      margin-bottom: 12px;
    }

    @media (max-width: 860px) {
      nav {
        border-radius: 24px;
        align-items: flex-start;
        flex-direction: column;
      }

      .workspace {
        height: auto;
        min-height: 0;
        grid-template-columns: 1fr;
      }

      .sidebar { min-height: 320px; }
      .chat-shell { min-height: 660px; }
    }

    @media (max-width: 640px) {
      .container { width: min(var(--maxw), calc(100% - 20px)); }
      .nav-wrap { padding: 10px 10px 0; }
      .sidebar, .chat-shell { border-radius: 24px; }
      .msg { max-width: 94%; }
      .composer { padding: 12px; }
      .send-btn { padding: 0 16px; }
    }
  </style>
</head>

<body>
  <div class="nav-wrap">
    <nav>
      <a class="brand" href="/">Celeste Huang</a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/#projects">Projects</a>
        <a class="nav-link" href="https://github.com/celesteisyy/cyssie-api" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </nav>
  </div>

  <main class="container">
    <section class="workspace">
      <aside class="sidebar">
        <div class="sidebar-head">
          <span class="eyebrow">Personal AI Agent</span>
          <h1>Cyssie Playground</h1>
          <p>A quiet workspace for asking, testing, and building with Cyssie.</p>
        </div>

        <div class="sidebar-actions">
          <button class="primary-btn" id="newChatButton" type="button">New chat</button>
          <button id="tokenButton" type="button">Access token</button>
        </div>

        <div class="sessions" id="sessions"></div>

        <div class="sidebar-foot">
          Conversations are saved locally in this browser.
        </div>
      </aside>

      <section class="chat-shell">
        <div class="chat-topbar">
          <div class="window-dots"><span></span><span></span><span></span></div>
          <div class="chat-title" id="activeTitle">cyssie_session.md</div>
          <div class="top-actions">
            <button class="small-btn" id="clearChatButton" type="button">Clear</button>
            <button class="small-btn danger-btn" id="deleteChatButton" type="button">Delete</button>
          </div>
        </div>

        <div id="chat"></div>

        <form class="composer" id="chatForm">
          <textarea id="messageInput" placeholder="Ask Cyssie..." rows="1"></textarea>
          <button class="send-btn" id="sendButton" type="submit">Send</button>
        </form>
      </section>
    </section>
  </main>

  <div class="token-modal" id="tokenModal">
    <div class="modal-card">
      <h2>Access token</h2>
      <p>Enter your Cyssie access token. It will be saved only in this browser.</p>
      <input id="tokenInput" type="password" placeholder="Access token" />
      <button class="primary-btn" id="saveTokenButton" type="button">Save token</button>
    </div>
  </div>

  <script>
    const API_BASE = "https://18-225-108-24.sslip.io";

    const STORAGE_KEY = "cyssie.sessions.v1";
    const ACTIVE_KEY = "cyssie.activeSessionId.v1";
    const TOKEN_KEY = "cyssie.accessToken.v1";

    const chat = document.getElementById("chat");
    const sessionsEl = document.getElementById("sessions");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const newChatButton = document.getElementById("newChatButton");
    const clearChatButton = document.getElementById("clearChatButton");
    const deleteChatButton = document.getElementById("deleteChatButton");
    const tokenButton = document.getElementById("tokenButton");
    const tokenModal = document.getElementById("tokenModal");
    const tokenInput = document.getElementById("tokenInput");
    const saveTokenButton = document.getElementById("saveTokenButton");
    const activeTitle = document.getElementById("activeTitle");

    let sessions = loadSessions();
    let activeSessionId = localStorage.getItem(ACTIVE_KEY);

    if (!sessions.length) createSession();

    if (!sessions.some(s => s.id === activeSessionId)) {
      activeSessionId = sessions[0].id;
      localStorage.setItem(ACTIVE_KEY, activeSessionId);
    }

    render();

    if (!getToken()) openTokenModal();

    function createId() {
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadSessions() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveSessions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function getActiveSession() {
      return sessions.find(s => s.id === activeSessionId) || sessions[0];
    }

    function createSession() {
      const session = {
        id: createId(),
        title: "New chat",
        createdAt: Date.now(),
        updatedAt: Date.now(),
        messages: [
          { role: "system", content: "Cyssie is awake. Start a new conversation whenever you are ready." }
        ]
      };

      sessions.unshift(session);
      activeSessionId = session.id;
      localStorage.setItem(ACTIVE_KEY, activeSessionId);
      saveSessions();
      return session;
    }

    function updateSessionTitle(session, firstUserMessage) {
      if (session.title !== "New chat") return;
      const compact = firstUserMessage.replace(/\s+/g, " ").trim();
      session.title = compact.length > 38 ? `${compact.slice(0, 38)}...` : compact || "New chat";
    }

    function addMessageToSession(role, content) {
      const session = getActiveSession();
      session.messages.push({ role, content });
      session.updatedAt = Date.now();

      if (role === "user") updateSessionTitle(session, content);

      sessions = [session, ...sessions.filter(s => s.id !== session.id)];
      activeSessionId = session.id;
      localStorage.setItem(ACTIVE_KEY, activeSessionId);
      saveSessions();
    }

    function nowLabelFromTimestamp(ts) {
      return new Date(ts).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function render() {
      renderSessions();
      renderMessages();
    }

    function renderSessions() {
      sessionsEl.innerHTML = "";
      sessions.forEach(session => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = `session-item ${session.id === activeSessionId ? "active" : ""}`;

        const title = document.createElement("span");
        title.className = "session-title";
        title.textContent = session.title;

        const meta = document.createElement("span");
        meta.className = "session-meta";
        meta.textContent = nowLabelFromTimestamp(session.updatedAt);

        item.append(title, meta);
        item.addEventListener("click", () => {
          activeSessionId = session.id;
          localStorage.setItem(ACTIVE_KEY, activeSessionId);
          render();
        });

        sessionsEl.appendChild(item);
      });
    }

    function renderMessages() {
      const session = getActiveSession();
      chat.innerHTML = "";
      activeTitle.textContent = `${session.title}.md`;

      session.messages.forEach(message => {
        const div = document.createElement("div");
        div.className = `msg ${message.role}`;
        div.textContent = message.content;
        chat.appendChild(div);
      });

      chat.scrollTop = chat.scrollHeight;
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || "";
    }

    function openTokenModal() {
      tokenInput.value = getToken();
      tokenModal.classList.add("visible");
      setTimeout(() => tokenInput.focus(), 50);
    }

    function closeTokenModal() {
      tokenModal.classList.remove("visible");
    }

    function toApiHistory(messages) {
      return messages
        .filter(m => m.role === "user" || m.role === "bot")
        .map(m => ({
          role: m.role === "bot" ? "assistant" : "user",
          content: m.content
        }))
        .slice(-12);
    }

    async function sendMessage(message) {
      const sessionBeforeUserMessage = getActiveSession();
      const history = toApiHistory(sessionBeforeUserMessage.messages);

      addMessageToSession("user", message);
      addMessageToSession("bot", "Cyssie is thinking...");
      render();

      const session = getActiveSession();
      const loadingMessage = session.messages[session.messages.length - 1];
      sendButton.disabled = true;

      try {
        const token = getToken();
        if (!token) {
          openTokenModal();
          throw new Error("Missing access token");
        }

        const response = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ message, history })
        });

        if (response.status === 401) {
          openTokenModal();
          throw new Error("Unauthorized. Please check your access token.");
        }

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        loadingMessage.content = data.response || "(No response)";
      } catch (error) {
        loadingMessage.content = `Cyssie could not respond: ${error.message}`;
      } finally {
        session.updatedAt = Date.now();
        saveSessions();
        render();
        sendButton.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      input.value = "";
      await sendMessage(message);
    });

    newChatButton.addEventListener("click", () => {
      createSession();
      render();
      input.focus();
    });

    clearChatButton.addEventListener("click", () => {
      const session = getActiveSession();
      session.messages = [
        { role: "system", content: "Session cleared. Cyssie is ready again." }
      ];
      session.updatedAt = Date.now();
      saveSessions();
      render();
      input.focus();
    });

    deleteChatButton.addEventListener("click", () => {
      if (!confirm("Delete this conversation?")) return;

      if (sessions.length === 1) {
        sessions = [];
        createSession();
      } else {
        sessions = sessions.filter(s => s.id !== activeSessionId);
        activeSessionId = sessions[0].id;
        localStorage.setItem(ACTIVE_KEY, activeSessionId);
      }

      saveSessions();
      render();
      input.focus();
    });

    tokenButton.addEventListener("click", openTokenModal);

    saveTokenButton.addEventListener("click", () => {
      const token = tokenInput.value.trim();
      if (token) localStorage.setItem(TOKEN_KEY, token);
      closeTokenModal();
      input.focus();
    });

    tokenModal.addEventListener("click", (event) => {
      if (event.target === tokenModal && getToken()) closeTokenModal();
    });

    tokenInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") saveTokenButton.click();
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
