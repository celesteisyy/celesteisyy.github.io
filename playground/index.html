<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cyssie Window</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 40px auto; }
    #chatbox { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>

<h2>Cyssie</h2>

<div id="chatbox"></div>

<input id="input" style="width: 80%;" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
  const inputField = document.getElementById("input");
  const message = inputField.value;
  if (!message) return;

  const chatbox = document.getElementById("chatbox");

  chatbox.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;
  inputField.value = "";

  const res = await fetch("https://cyssie-api.onrender.com/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: message })
  });

  const data = await res.json();

  chatbox.innerHTML += `<div class="bot"><b>Cyssie:</b> ${data.response}</div>`;
  chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

  </footer>
</body>
</html>
